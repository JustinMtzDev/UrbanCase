<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UrbanCase — POS Accesorios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="blob blob1" aria-hidden="true"></div>
  <div class="blob blob2" aria-hidden="true"></div>
  <div class="blob blob3" aria-hidden="true"></div>
  <div class="app">
    <header>
      <div class="logo">
        <img src="img/urbanCase.svg" alt="UrbanCase" class="logo-brand">
        <span class="logo-icon-wrap">
          <img src="img/logo.svg" alt="" class="logo-icon logo-icon-light" aria-hidden="true">
          <img src="img/logoDark.svg" alt="" class="logo-icon logo-icon-dark" aria-hidden="true">
        </span>
      </div>
      <nav class="categorias">
        <button type="button" class="categoria-btn activo" data-categoria="todos">Home</button>
        <button type="button" class="categoria-btn" data-categoria="cargadores">Inventario</button>
        <button type="button" class="categoria-btn" data-categoria="fundas">Ventas</button>
        <button type="button" class="categoria-btn" data-categoria="protectores">Reportes</button>
        <button type="button" class="categoria-btn" data-categoria="cables">Proveedores</button>
        <button type="button" class="categoria-btn" data-categoria="otros">Clientes</button>
        <button type="button" class="categoria-btn" data-categoria="usuarios">Usuarios</button>
      </nav>
      <div class="usuario-header" id="usuario-info" style="display:none">
        <span class="usuario-nombre" id="usuario-nombre"></span>
        <button type="button" class="btn-logout" id="btn-logout">Salir</button>
      </div>
    </header>

    <div class="app-glass" id="vista-pos">
      <main class="productos-grid" id="productos"></main>
      <aside class="carrito-panel">
        <h2>Carrito <span id="carrito-count">0</span></h2>
        <div class="carrito-lista" id="carrito-lista">
          <div class="carrito-vacio" id="carrito-vacio">Añade productos tocando una tarjeta</div>
        </div>
        <div class="carrito-totales">
          <div class="carrito-fila">
            <span>Subtotal</span>
            <span id="subtotal">$0.00</span>
          </div>
          <div class="carrito-fila total">
            <span>Total</span>
            <span id="total">$0.00</span>
          </div>
        </div>
        <div class="carrito-acciones">
          <button type="button" class="btn btn-vaciar" id="btn-vaciar">Vaciar</button>
          <button type="button" class="btn btn-cobrar" id="btn-cobrar" disabled>Cobrar</button>
        </div>
      </aside>
    </div>

    <div class="app-glass modulo-panel" id="vista-usuarios" style="display:none">
      <div class="modulo-header">
        <h2>Usuarios</h2>
        <div class="modulo-acciones">
          <input type="text" class="modulo-buscar" id="buscar-usuario" placeholder="Buscar usuario...">
          <button type="button" class="btn btn-cobrar" id="btn-nuevo-usuario">+ Nuevo</button>
        </div>
      </div>
      <div class="tabla-wrap">
        <table class="tabla" id="tabla-usuarios">
          <thead>
            <tr>
              <th>ID</th>
              <th>Usuario</th>
              <th>Nombre</th>
              <th>Rol</th>
              <th>Estado</th>
              <th>Acciones</th>
              <th>Creado</th>
            </tr>
          </thead>
          <tbody id="tbody-usuarios"></tbody>
        </table>
      </div>
    </div>

    <div id="modal-usuario" class="modal-overlay">
      <div class="modal-content modal-form">
        <h3 id="modal-usuario-titulo">Nuevo usuario</h3>
        <form id="form-usuario">
          <div class="form-row">
            <label>Usuario</label>
            <input type="text" id="mu-usuario" required>
          </div>
          <div class="form-row">
            <label>Nombre</label>
            <input type="text" id="mu-nombre" required>
          </div>
          <div class="form-row">
            <label>Contraseña</label>
            <input type="password" id="mu-password" placeholder="Dejar vacío para no cambiar">
          </div>
          <div class="form-row">
            <label>Rol</label>
            <select id="mu-rol">
              <option value="vendedor">Vendedor</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div class="form-row">
            <label>Activo</label>
            <select id="mu-activo">
              <option value="true">Sí</option>
              <option value="false">No</option>
            </select>
          </div>
          <div class="modal-acciones">
            <button type="button" class="btn btn-vaciar" id="modal-usuario-cancelar">Cancelar</button>
            <button type="submit" class="btn btn-cobrar">Guardar</button>
          </div>
        </form>
      </div>
    </div>

    <div id="modal-confirmar" class="modal-overlay">
      <div class="modal-content">
        <h3>Confirmar eliminación</h3>
        <p id="confirmar-texto">¿Eliminar este usuario?</p>
        <div class="modal-acciones">
          <button type="button" class="btn btn-vaciar" id="confirmar-cancelar">Cancelar</button>
          <button type="button" class="btn btn-danger" id="confirmar-ok">Eliminar</button>
        </div>
      </div>
    </div>
  </div>

  <div id="modal-venta">
    <div class="modal-content">
      <h3>Venta completada</h3>
      <p>Total cobrado:</p>
      <div class="modal-total" id="modal-total">$0.00</div>
      <div class="modal-acciones">
        <button type="button" class="btn btn-vaciar" id="modal-cerrar">Cerrar</button>
        <button type="button" class="btn btn-cobrar" id="modal-nueva">Nueva venta</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
